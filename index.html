<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Professional AI Lesson Planner - Fedrick MB</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @media print { .no-print { display: none; } #print-area { width: 100%; border: none; } }
        .loading-dots:after { content: ' .'; animation: dots 1.5s steps(5, end) infinite; }
        @keyframes dots { 0%, 20% { color: rgba(0,0,0,0); text-shadow: .5em 0 0 rgba(0,0,0,0), 1em 0 0 rgba(0,0,0,0); } 40% { color: #1e40af; text-shadow: .5em 0 0 rgba(0,0,0,0), 1em 0 0 rgba(0,0,0,0); } 60% { text-shadow: .5em 0 0 #1e40af, 1em 0 0 rgba(0,0,0,0); } 80%, 100% { text-shadow: .5em 0 0 #1e40af, 1em 0 0 #1e40af; } }
        table { width: 100%; border-collapse: collapse; margin-top: 15px; border: 2px solid black; }
        th, td { border: 1px solid black; padding: 10px; text-align: left; vertical-align: top; font-size: 13px; color: black; }
        th { background-color: #f3f4f6; font-weight: bold; }
    </style>
</head>
<body class="bg-slate-50 font-sans">

    <div class="container mx-auto p-4 lg:p-8">
        <header class="mb-8 text-center no-print">
            <h1 class="text-3xl font-extrabold text-blue-900 uppercase">FEDRICK MB AI PLANNER</h1>
            <p class="text-slate-500 text-sm">Competence-Based Curriculum Standard</p>
        </header>

        <div class="flex flex-col lg:flex-row gap-8">
            <!-- INPUT FORM -->
            <div class="w-full lg:w-1/3 bg-white p-6 rounded-2xl shadow-xl no-print border border-slate-200">
                <h2 class="text-lg font-bold mb-4 text-blue-700 border-b pb-2 uppercase text-xs">Preliminary Parts</h2>
                <div class="space-y-3">
                    <input id="school" type="text" placeholder="School Name" class="w-full p-2.5 border rounded-lg text-sm">
                    <input id="teacher" type="text" placeholder="Teacher's Name" class="w-full p-2.5 border rounded-lg text-sm">
                    <div class="grid grid-cols-2 gap-2">
                        <input id="form" type="text" placeholder="Form" class="w-full p-2.5 border rounded-lg text-sm">
                        <input id="subject" type="text" placeholder="Subject" class="w-full p-2.5 border rounded-lg text-sm">
                    </div>
                    <textarea id="mainComp" placeholder="Main Competence" class="w-full p-2 border rounded-lg text-xs h-14"></textarea>
                    <textarea id="specComp" placeholder="Specific Competence" class="w-full p-2 border rounded-lg text-xs h-14"></textarea>
                    <textarea id="specActivity" placeholder="Specific Learning Activity" class="w-full p-2 border rounded-lg text-xs h-14"></textarea>
                    <textarea id="resources" placeholder="Resources" class="w-full p-2 border rounded-lg text-xs h-14"></textarea>
                    <textarea id="refs" placeholder="References" class="w-full p-2 border rounded-lg text-xs h-14"></textarea>
                    
                    <button onclick="runFedrickAI()" id="genBtn" class="w-full bg-blue-800 text-white font-bold py-4 rounded-xl hover:bg-black shadow-lg">
                        GENERATE LESSON PLAN
                    </button>

                    <a href="https://wa.me/255616435291" target="_blank" class="block text-center mt-3 text-green-700 text-xs font-bold bg-green-50 p-2 rounded-lg border border-green-200">
                        💬 Contact Fedrick (0616435291)
                    </a>
                </div>
            </div>

            <!-- RESULT -->
            <div class="w-full lg:w-2/3 bg-white p-8 rounded-2xl shadow-xl border border-slate-100 min-h-[700px] relative">
                <div id="loader" class="hidden absolute inset-0 bg-white/95 z-50 flex flex-col items-center justify-center rounded-2xl">
                    <div class="w-12 h-12 border-4 border-slate-200 border-t-blue-700 rounded-full animate-spin mb-4"></div>
                    <p class="text-blue-900 font-bold loading-dots">Fedrick's AI is processing</p>
                </div>

                <div id="print-area">
                    <div id="result-box" class="text-slate-800">
                        <div class="text-center py-40 opacity-20">
                            <h2 class="text-5xl font-bold italic">FEDRICK MB</h2>
                            <p>Fill form to generate</p>
                        </div>
                    </div>
                </div>

                <div id="action-bar" class="hidden mt-6 flex gap-3 no-print border-t pt-5">
                    <button onclick="window.print()" class="bg-black text-white px-8 py-3 rounded-xl font-bold">PRINT / PDF</button>
                    <button onclick="location.reload()" class="bg-slate-100 text-slate-500 px-8 py-3 rounded-xl font-bold">RESET</button>
                </div>
            </div>
        </div>

        <footer class="mt-10 text-center text-slate-400 no-print text-xs border-t pt-5">
            <p>&copy; 2026 <strong>FEDRICK MB</strong> | 0616435291</p>
        </footer>
    </div>

    <script>
        const API_KEY = "AIzaSyA9ykLQKNpmJZQbHNP9Uh_MBr3CseLlTRw";

        async function runFedrickAI() {
            const getVal = (id) => document.getElementById(id).value;
            const btn = document.getElementById('genBtn');
            const loader = document.getElementById('loader');
            const resultBox = document.getElementById('result-box');

            if (!getVal('subject') || !getVal('specActivity')) {
                alert("Please fill Subject and Specific Activity!");
                return;
            }

            loader.classList.remove('hidden');
            btn.disabled = true;

            const prompt = `You are a curriculum expert. Generate ONLY the "Teaching and Learning Process" table in English.
            Subject: ${getVal('subject')}. Activity: ${getVal('specActivity')}.
            Structure: 4 columns (Stages/Time, Teaching Activities, Learning Activities, Assessment Criteria).
            Stages: Introduction (05 min), Competence Development (20 min), Design (10 min), Realisation (05 min).
            Mandatory: Every Teaching Activity MUST start with "To".
            Return ONLY the HTML code for the <table> tag.`;

            // Function for exponential backoff retry
            const fetchWithRetry = async (url, options, retries = 3) => {
                for (let i = 0; i < retries; i++) {
                    try {
                        const res = await fetch(url, options);
                        if (res.ok) return res;
                    } catch (e) {
                        if (i === retries - 1) throw e;
                    }
                    await new Promise(r => setTimeout(r, 1000 * (i + 1)));
                }
            };

            try {
                const url = `https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${API_KEY}`;
                const response = await fetchWithRetry(url, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ contents: [{ parts: [{ text: prompt }] }] })
                });

                const json = await response.json();
                
                if (json.candidates && json.candidates[0].content) {
                    let tableContent = json.candidates[0].content.parts[0].text;
                    tableContent = tableContent.replace(/```html|```/g, '').trim();

                    resultBox.innerHTML = `
                        <div class="text-center mb-6">
                            <h2 class="text-2xl font-bold uppercase underline">LESSON PLAN</h2>
                        </div>
                        <div class="grid grid-cols-2 gap-y-2 text-[11px] mb-4 border-b-2 border-black pb-4">
                            <p><strong>School:</strong> ${getVal('school') || '_____'}</p>
                            <p><strong>Teacher:</strong> ${getVal('teacher') || '_____'}</p>
                            <p><strong>Form:</strong> ${getVal('form') || '_____'}</p>
                            <p><strong>Subject:</strong> ${getVal('subject') || '_____'}</p>
                            <p><strong>Main Comp:</strong> ${getVal('mainComp') || '_____'}</p>
                            <p><strong>Spec Comp:</strong> ${getVal('specComp') || '_____'}</p>
                            <p><strong>Learning Activity:</strong> ${getVal('specActivity') || '_____'}</p>
                            <p><strong>Resources:</strong> ${getVal('resources') || '_____'}</p>
                            <p><strong>References:</strong> ${getVal('refs') || '_____'}</p>
                        </div>
                        <div class="ai-table">${tableContent}</div>
                        <div class="mt-8 pt-4 border-t border-dotted border-black">
                            <p class="text-[11px] italic"><strong>Remarks:</strong> .......................................................................................................................................................................................................................................................................................................................................................</p>
                        </div>
                    `;
                    document.getElementById('action-bar').classList.remove('hidden');
                } else {
                    alert("AI is still processing. Please click the button again.");
                }
            } catch (err) {
                alert("Connection Error. Please check your internet or try again.");
                console.error(err);
            } finally {
                loader.classList.add('hidden');
                btn.disabled = false;
            }
        }
    </script>
</body>
</html>
