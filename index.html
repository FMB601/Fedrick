<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Professional AI Lesson Planner - Fedrick MB</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @media print { .no-print { display: none; } #print-area { width: 100%; border: none; } }
        .loading-dots:after { content: ' .'; animation: dots 1.5s steps(5, end) infinite; }
        @keyframes dots { 0%, 20% { color: rgba(0,0,0,0); text-shadow: .5em 0 0 rgba(0,0,0,0), 1em 0 0 rgba(0,0,0,0); } 40% { color: #1e40af; text-shadow: .5em 0 0 rgba(0,0,0,0), 1em 0 0 rgba(0,0,0,0); } 60% { text-shadow: .5em 0 0 #1e40af, 1em 0 0 rgba(0,0,0,0); } 80%, 100% { text-shadow: .5em 0 0 #1e40af, 1em 0 0 #1e40af; } }
        table { width: 100%; border-collapse: collapse; margin-top: 10px; }
        th, td { border: 1px solid black; padding: 8px; text-align: left; vertical-align: top; font-size: 13px; }
        th { background-color: #f3f4f6; }
    </style>
</head>
<body class="bg-gray-50 font-sans">

    <div class="container mx-auto p-4 lg:p-8">
        <header class="mb-10 text-center no-print">
            <h1 class="text-4xl font-bold text-blue-900 uppercase">Professional AI Lesson Planner</h1>
            <p class="text-gray-600 mt-2">Accurate Lesson Plan Generation for the New Curriculum</p>
        </header>

        <div class="flex flex-col lg:flex-row gap-8">
            <div class="w-full lg:w-1/3 bg-white p-6 rounded-xl shadow-lg no-print">
                <h2 class="text-xl font-bold mb-6 border-b pb-2 text-blue-800">Preliminary Parts</h2>
                
                <div class="space-y-4">
                    <input id="school" type="text" placeholder="Name of School" class="w-full p-3 border rounded-lg">
                    <input id="teacher" type="text" placeholder="Teacher's Name" class="w-full p-3 border rounded-lg">
                    <div class="grid grid-cols-2 gap-2">
                        <input id="form" type="text" placeholder="Form (e.g., One)" class="w-full p-3 border rounded-lg">
                        <input id="subject" type="text" placeholder="Subject" class="w-full p-3 border rounded-lg">
                    </div>
                    <textarea id="mainComp" placeholder="Main Competence" class="w-full p-3 border rounded-lg h-16"></textarea>
                    <textarea id="specComp" placeholder="Specific Competence" class="w-full p-3 border rounded-lg h-16"></textarea>
                    <textarea id="mainActivity" placeholder="Main Learning Activity" class="w-full p-3 border rounded-lg h-16"></textarea>
                    <textarea id="specActivity" placeholder="Specific Learning Activity" class="w-full p-3 border rounded-lg h-16"></textarea>
                    <textarea id="resources" placeholder="Teaching and Learning Resources" class="w-full p-3 border rounded-lg h-16"></textarea>
                    <textarea id="refs" placeholder="References" class="w-full p-3 border rounded-lg h-16"></textarea>
                    
                    <button onclick="generateLessonPlan()" id="generateBtn" class="w-full bg-blue-900 text-white font-bold py-4 rounded-lg hover:bg-blue-800 transition shadow-md">
                        GENERATE DEVELOPMENT
                    </button>
                    
                    <a href="https://wa.me/255616435291?text=Habari%20Fedrick,%20ninaomba%20msaada%20kuhusu%20mfumo%20wa%20Lesson%20Plan." target="_blank" class="block text-center mt-4 text-green-600 font-semibold border border-green-600 p-2 rounded-lg hover:bg-green-50">
                        💬 Send Message to Fedrick
                    </a>
                </div>
            </div>

            <div class="w-full lg:w-2/3 bg-white p-8 rounded-xl shadow-lg border border-gray-100 min-h-[800px] relative">
                <div id="loader" class="hidden absolute inset-0 bg-white/90 z-10 flex flex-col items-center justify-center rounded-xl">
                    <div class="w-16 h-16 border-4 border-blue-200 border-t-blue-900 rounded-full animate-spin mb-4"></div>
                    <p class="text-blue-900 font-bold loading-dots">Fedrick's AI is processing</p>
                </div>

                <div id="print-area">
                    <div id="result-content" class="text-gray-800">
                        <p class="text-center text-gray-400 mt-40 italic">Lesson development will appear here.</p>
                    </div>
                </div>

                <div id="action-btns" class="hidden mt-8 flex gap-4 no-print border-t pt-4">
                    <button onclick="window.print()" class="bg-green-600 text-white px-8 py-3 rounded-lg font-bold hover:bg-green-700">Print / PDF</button>
                    <button onclick="location.reload()" class="bg-gray-200 text-gray-700 px-8 py-3 rounded-lg font-bold">Clear All</button>
                </div>
            </div>
        </div>

        <footer class="mt-12 text-center text-gray-500 no-print border-t pt-6">
            <p>&copy; 2026 <strong>FEDRICK MB</strong>. All Rights Reserved.</p>
            <p>Admin: <strong>Fedrick</strong> | Contact: <strong>0616435291</strong></p>
        </footer>
    </div>

    <script>
        const API_KEY = "AIzaSyA9ykLQKNpmJZQbHNP9Uh_MBr3CseLlTRw";

        async function generateLessonPlan() {
            const data = {
                school: document.getElementById('school').value,
                teacher: document.getElementById('teacher').value,
                form: document.getElementById('form').value,
                subject: document.getElementById('subject').value,
                mainComp: document.getElementById('mainComp').value,
                specComp: document.getElementById('specComp').value,
                mainActivity: document.getElementById('mainActivity').value,
                specActivity: document.getElementById('specActivity').value,
                resources: document.getElementById('resources').value,
                refs: document.getElementById('refs').value
            };

            const loader = document.getElementById('loader');
            const resultArea = document.getElementById('result-content');
            const actionBtns = document.getElementById('action-btns');
            const generateBtn = document.getElementById('generateBtn');

            loader.classList.remove('hidden');
            generateBtn.disabled = true;

            const systemPrompt = `You are a professional teacher. Generate a "Teaching and Learning Process" table in English.
            RULES:
            1. Every point in "Teaching Activities" MUST start with "To".
            2. Stages: Introduction (05 min), Competence Development (20 min), Design (10 min), Realisation (05 min).
            3. Subject context: ${data.subject} | Activity: ${data.specActivity}.
            4. Format as an HTML table with columns: Stages/Time, Teaching Activities, Learning Activities, Assessment Criteria.`;

            try {
                const response = await fetch(\`https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=\${API_KEY}\`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ contents: [{ parts: [{ text: systemPrompt }] }] })
                });

                const result = await response.json();
                const aiText = result.candidates[0].content.parts[0].text.replace(/\\\`\\\`\\\`html|\\\`\\\`\\\`/g, '');

                resultArea.innerHTML = \`
                    <div class="text-center mb-6">
                        <h2 class="text-2xl font-bold uppercase underline">LESSON PLAN</h2>
                    </div>
                    <div class="grid grid-cols-2 gap-x-4 text-xs mb-4 border-b pb-4">
                        <p><strong>Name of School:</strong> \${data.school || '................'}</p>
                        <p><strong>Teacher's Name:</strong> \${data.teacher || '................'}</p>
                        <p><strong>Form:</strong> \${data.form || '................'}</p>
                        <p><strong>Subject:</strong> \${data.subject || '................'}</p>
                        <p><strong>Main Competence:</strong> \${data.mainComp || '................'}</p>
                        <p><strong>Specific Competence:</strong> \${data.specComp || '................'}</p>
                        <p><strong>Main Learning Activity:</strong> \${data.mainActivity || '................'}</p>
                        <p><strong>Specific Learning Activity:</strong> \${data.specActivity || '................'}</p>
                        <p><strong>Resources:</strong> \${data.resources || '................'}</p>
                        <p><strong>References:</strong> \${data.refs || '................'}</p>
                    </div>
                    \${aiText}
                    <div class="mt-6 text-xs">
                        <p><strong>Remarks:</strong> ....................................................................................................</p>
                    </div>
                \`;
                actionBtns.classList.remove('hidden');
            } catch (e) {
                alert("Error: Check API Key or Connection.");
            } finally {
                loader.classList.add('hidden');
                generateBtn.disabled = false;
            }
        }
    </script>
</body>
</html>
